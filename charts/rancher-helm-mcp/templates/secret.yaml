{{- if not .Values.rancher.existingSecret }}
{{- if not .Values.rancher.url }}
{{- fail "rancher.url is required when rancher.existingSecret is not set" }}
{{- end }}
{{- if not .Values.rancher.token }}
{{- fail "rancher.token is required when rancher.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rancher-helm-mcp.fullname" . }}-rancher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rancher-helm-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  RANCHER_URL: {{ .Values.rancher.url | quote }}
  RANCHER_TOKEN: {{ .Values.rancher.token | quote }}
{{- end }}
